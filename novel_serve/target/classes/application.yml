spring:
  application:
    name: novel-serve
  datasource:
    url: jdbc:mysql://localhost:3306/novel?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
#此项是启动项目自动加载sql文件到数据库，开启此项请把sql文件放到resources目录下
#  sql:
#    init:
#      mode: always
#      schema-locations: classpath:schema.sql,classpath:agents_data.sql,classpath:data.sql
#      encoding: UTF-8
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  web:
    cors:
      allowed-origins: http://localhost:5173
      allowed-methods: GET,POST,PUT,DELETE,OPTIONS
      allowed-headers: '*'
      allow-credentials: true

server:
  port: 8080